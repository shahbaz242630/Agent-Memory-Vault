[package]
name = "vault-storage"
description = "Persistent storage across LanceDB (vectors), DuckDB (graph), and SQLite/SQLCipher (metadata). See BRD §5.2."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
vault-core = { path = "../vault-core" }
rusqlite = { workspace = true }
# LanceDB vector store (T0.1.4). lancedb re-exports arrow_schema; arrow-array
# is needed directly for RecordBatch, RecordBatchIterator, Float32Array,
# FixedSizeListArray. Versions pinned in workspace Cargo.toml.
lancedb = { workspace = true }
arrow-array = { workspace = true }
arrow-schema = { workspace = true }
# DuckDB graph store (T0.1.5). Pinned in workspace Cargo.toml. `bundled`
# avoids requiring a system DuckDB install. Connection: Send + !Sync — same
# shape as rusqlite, wrapped in Mutex<Connection> + spawn_blocking.
duckdb = { workspace = true }
futures = { workspace = true }
tokio = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
blake3 = { workspace = true }
zeroize = { workspace = true }

[dev-dependencies]
proptest = { workspace = true }
tempfile = { workspace = true }
tokio-test = { workspace = true }
# tracing-test — T0.1.10 Phase 3b: thread-local subscriber that captures
# `tracing` events emitted during a test. Used to pin ADR-010
# compensating-control #3 (the plaintext-on-disk WARN logs) against
# regression. Closes the T0.1.4 test gap that ADR-010 line 539
# specified ("assert the WARN log fires on every open") but wasn't
# implemented at T0.1.4. `no-env-filter` feature already configured in
# workspace deps.
tracing-test = { workspace = true }
# T0.2.0 Phase 0c (post-lancedb-bump) will re-add lance / object_store /
# dryoc / bytes / url here at versions matching lancedb 0.27's transitives,
# for the rewritten ObjectStoreProvider-based at_rest_spike.rs. Removed
# during Phase 0a to keep the dep-bump exploration clean — old spike
# preserved at crates/vault-storage/examples/at_rest_spike.rs.v1_fail_disabled
# as executable documentation of the LocalObjectReader-bypass FAIL.
