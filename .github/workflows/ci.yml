      # --all-targets` under the runner disk ceiling. Added 2026-06-24 with
      # the multi-agent daemon arc (see the tool-cache:true note above for the
      # `No space left on device` root cause). `-C debuginfo=line-tables-only`
      # cuts per-artifact debug-info volume ~10× while keeping panic
      # backtraces with file:line — the identical proven flag the Windows leg
      # already uses (T0.2.3 commit 13). Does NOT change test semantics. Set
      # before rust-cache so the cache key reflects the flag (mirrors the
      # Windows RUSTFLAGS override placement). macOS unaffected (more disk).
      - if: runner.os == 'Linux'
        name: Reduce debuginfo on Linux (disk-ceiling fix)
        shell: bash
        run: echo "RUSTFLAGS=-D warnings -C debuginfo=line-tables-only" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Cache vault-embedding test fixtures (~165 MB total: model.onnx ~133 MB
      # + tokenizer.json ~711 KB + libonnxruntime.so ~30 MB). Key fingerprints
      # both the setup script (which hardcodes EXPECTED_MODEL_SHA256 +
      # ORT_VERSION + download URLs) AND integrity.rs (which holds the
      # canonical model + tokenizer SHA-256 constants per ADR-020). Either
      # changing busts the cache and forces a fresh provisioning. Per-OS
      # cache key isolates Linux vs. Windows fixtures (Step 2c).
      - name: Cache vault-embedding test fixtures
        uses: actions/cache@v4
        id: vault-embedding-fixtures
        with:
          path: crates/vault-embedding/test-fixtures
          # Cache key fingerprints BOTH setup scripts (.sh and .ps1) plus
          # integrity.rs so any change to model SHA / ORT_VERSION / download
          # URLs in either platform's setup script busts cache for both OSes.
          # Per-OS isolation preserved via runner.os in the key prefix —
          # Linux fixtures (libonnxruntime.so) and Windows fixtures
          # (onnxruntime.dll) don't collide.
          key: vault-embedding-fixtures-${{ runner.os }}-${{ hashFiles('scripts/setup-dev-env.sh', 'scripts/setup-dev-env.ps1', 'crates/vault-embedding/src/integrity.rs') }}
      - name: Provision vault-embedding test fixtures (Linux)
        if: steps.vault-embedding-fixtures.outputs.cache-hit != 'true' && runner.os == 'Linux'
        run: bash scripts/setup-dev-env.sh
      - name: Provision vault-embedding test fixtures (Windows)
        # Strawberry Perl is preinstalled on windows-2025 (Windows Server
        # 2022) and required by ADR-006's bundled-sqlcipher-vendored-openssl
        # rusqlite feature for the SQLCipher build. If a future runner image
        # drops Strawberry Perl, add `shogo82148/actions-setup-perl@v1` step
        # before rust-toolchain — see HANDOFF.md tech-debt for the watchpoint.
        if: steps.vault-embedding-fixtures.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/setup-dev-env.ps1
      - name: Provision vault-embedding test fixtures (macOS)
        # macOS provisioning invokes the existing setup-dev-env.sh — the
        # Darwin branch at scripts/setup-dev-env.sh:131-135 was already
        # written at T0.1.7 (sets ORT_ASSET=onnxruntime-osx-arm64-${ORT_VERSION}.tgz,
        # ORT_LIB_NAME=libonnxruntime.dylib). No script change needed; CI
        # just invokes the same script as Linux (uname -s routes the case).
        if: steps.vault-embedding-fixtures.outputs.cache-hit != 'true' && runner.os == 'macOS'
        run: bash scripts/setup-dev-env.sh
      # Phase 5a's tauri.conf.json bundle.resources references onnxruntime.dll
      # (Windows-specific). setup-dev-env.sh's Linux + Darwin branches download
      # libonnxruntime.so / libonnxruntime.dylib respectively, NOT
      # onnxruntime.dll. tauri-build validates ALL bundle.resources paths exist
      # at compile time regardless of platform. Empty touch placeholder on
      # non-Windows satisfies the check; V0.1 only ships Windows MSI per
      # ADR-031, so non-Windows never USES the DLL. V0.2 alpha-distribution
      # will replace via per-platform bundle.windows.resources syntax.
      # (T0.1.11 Phase 5d fix-forward, 2026-05-06.)
      - name: Placeholder onnxruntime.dll on non-Windows for tauri-build cross-platform validation
        if: runner.os != 'Windows'
        shell: bash
        run: touch crates/vault-embedding/test-fixtures/bge-small-en-v1.5/onnxruntime.dll
      # Windows-only: lower cargo build parallelism to 2 to avoid peak-memory
      # OOM on the GitHub Actions windows-2025 runner. T0.2.0 Phase 3
      # sub-task (f) commit `ef88361` (2026-05-12) hit two consecutive
      # Windows-only failures with different OOM stages: first run
      # `rustc-LLVM ERROR: out of memory` during vault-tauri codegen, second
      # run `LINK : fatal error LNK1102: out of memory` during integration-
      # test linking. Two distinct stages OOM-ing in a row confirmed the
      # Windows build is at the memory ceiling — not a transient flake.
      # CARGO_BUILD_JOBS=2 caps parallel codegen + linker invocations so
      # peak resident-set stays under the runner's ~16 GB ceiling. Linux +
      # macOS runners are unaffected (larger memory ceiling and lower
      # link-stage overhead per build unit). Trade-off: Windows job runs
      # ~5-10 min slower; build succeeds reliably.
      - if: runner.os == 'Windows'
        name: Lower cargo build parallelism on Windows (peak-memory ceiling fix)
        shell: bash
        run: echo "CARGO_BUILD_JOBS=2" >> "$GITHUB_ENV"
      - if: runner.os == 'Windows'
        name: Pin MSVC toolset to v143 (14.44) — VS2026 default breaks DuckDB fmt + llama ggml
        # See the matching step in the clippy job for full rationale. v143
        # (MSVC 14.44, VS2022-era) is the compatibility toolset still shipped on
        # the windows-2025/VS2026 image and the compiler that produced the last
        # green CI (d613614). Pinning vcvars to it fixes BOTH the DuckDB fmt and
        # llama ggml VS2026 breaks for cc-rs AND the Ninja/CMake build. Replaces
        # the dead-end /FI _SECURE_SCL shim (ADR-079).
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: '14.44'
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace

