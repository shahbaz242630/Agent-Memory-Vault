name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # T0.2.1 ADR-044 / iteration 2 concern #1 lock: weekly cron triggers the
  # `real-model-smoke` job that runs `#[ignore]`'d real-model integration
  # tests against the actual 2.49 GB Phi-4-mini GGUF. The standard
  # fmt/clippy/build-test jobs are gated `if: github.event_name != 'schedule'`
  # to avoid burning CI on a duplicate run.
  schedule:
    - cron: '0 12 * * MON'  # Monday 12:00 UTC

# Windows runner choice: T0.2.3 close commit 9 fix-forward (2026-05-17). The
# clippy + build-and-test matrices + the real-model-smoke job use `windows-2025`
# (Windows Server 2025 + Visual Studio 2026 / MSBuild 18), not `windows-latest`
# (currently Windows Server 2022 + VS 2022 / MSBuild 17 until GitHub's
# 2026-06-08→06-15 migration). Commits 5+6+7+8 all failed Windows CI on a
# VS 2022 / MSBuild 17 bug where llama-cpp-sys-2's `vulkan-shaders-gen`
# ExternalProject_Add sub-build hit `error C1083: Cannot open compiler
# generated file: '': Invalid argument` + `The system cannot find the batch
# label specified - VCEnd` in CMakeTestCCompiler. Hypothesis: VS 2026's
# MSBuild 18 doesn't have the bug (ggml-org/llama.cpp's own release.yml CI
# successfully ships Windows Vulkan binaries from `windows-2025` runners).
# If commit 9 still red on `windows-2025`, candidates B (Ninja generator),
# C (downgrade llama-cpp-2 to v0.1.139), D (accept Windows-CI-Vulkan gap +
# document scope in ADR) are documented in HANDOFF.md next-session opener.
#
# 2026-06-15 update: GitHub's 06-08→06-15 migration swapped the `windows-2025`
# image's compiler from VS2022 to Visual Studio 2026 (MSVC 14.51), which broke
# BOTH the bundled-DuckDB fmt (`stdext::checked_array_iterator` removed) AND
# llama.cpp's ggml (`std::hardware_destructive_interference_size`). The last
# green CI (d613614, 2026-06-10) ran on the pre-migration VS2022 compiler. Rather
# than switch off the carefully-tuned windows-2025 image (Ninja + lld-link +
# D:\t + disk cleanup), each Windows job now pins the MSVC toolset to v143
# (14.44, VS2022-era) — still shipped on the image "for compatibility" — via
# `ilammy/msvc-dev-cmd`, restoring the exact green compiler. This SUPERSEDES the
# dead-end /FI _SECURE_SCL shim (ADR-079, commit 669b8a5), which only reached
# cc-rs and leaked a feature macro into ggml. Remove the pin once libduckdb-sys
# vendors a newer fmt and llama-cpp-sys-2 supports VS2026 (HANDOFF tech-debt #8).

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Definition of Done (BRD §0.1) requires zero warnings everywhere.
  RUSTFLAGS: "-D warnings"
  # ADR-038: bound lance/datafusion memory pool to 256 MiB so concurrent
  # merge_insert calls don't trigger 8 GB allocation aborts on the runner
  # (Phase 0a regression, 2026-05-07). Mirrors `.cargo/config.toml` `[env]`
  # but set here too because (a) ci.yml env survives even if .cargo/config
  # is ignored by future workflows that don't run via cargo, and (b) makes
  # the CI enforcement explicit at the workflow level for auditability.
  # See `crates/vault-storage/src/vector_store.rs` upsert_lock doc and
  # upstream lance-format/lance#1983 + #3601.
  LANCE_MEM_POOL_SIZE: "268435456"

jobs:
  fmt:
    name: cargo fmt
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy
    if: github.event_name != 'schedule'
    strategy:
      # fail-fast: false so a Windows-only failure (or vice versa) surfaces
      # both conclusions instead of cancelling the surviving runner. Important
      # for matrix verification — we need to see EACH OS's outcome.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Linux-only: free ~15-20GB by removing unused tooling. The jlumbroso
      # action is Linux-only by design (uses apt-get / rm -rf /usr/share/dotnet
      # etc.). Windows has its own equivalent inline PowerShell cleanup in the
      # build-and-test job below (T0.2.3 close commit 15 fix-forward, 2026-05-25,
      # after commit 14's CI run 26372365294 hit "LLVM ERROR: no space on device"
      # during lld-link of large workspace test binaries). Clippy Windows is
      # NOT cleaned because clippy passes without it — only the heavier
      # build-and-test job hits the disk ceiling.
      # See HANDOFF.md "CI Discipline Recovery — 2026-05-03 finding" for the
      # 22-commit silent-failure context that landed this in Step 2a.
      - if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: true
          docker-images: true
      - uses: actions/checkout@v6
      # Tauri 2.x Linux native deps (T0.1.11 Phase 3) — required by
      # vault-tauri (and any test target that pulls vault-tauri's lib
      # transitively for the `tauri` crate's webkit2gtk / appindicator
      # FFI bindings). webkit2gtk-4.1 is the v2 line; -4.0 was v1.
      # Per Tauri 2 prerequisites: libwebkit2gtk-4.1-dev, libxdo-dev,
      # libayatana-appindicator3-dev, librsvg2-dev. libssl-dev is
      # preinstalled on ubuntu-latest. macOS + Windows ship the
      # equivalents preinstalled (Apple webkit + Microsoft WebView2).
      - if: runner.os == 'Linux'
        name: Install Tauri 2.x Linux native deps
        # libglib2.0-dev + libgtk-3-dev added defensively after T0.1.11
        # Phase 2+3 CI surfaced "Package 'glib-2.0' was not found in the
        # pkg-config search path" failure on glib-sys v0.18.1 build script.
        # Root cause: jlumbroso/free-disk-space (large-packages:true) above
        # removes packages that transitively pulled in libglib2.0-dev;
        # libwebkit2gtk-4.1-dev's apt Depends doesn't include libglib2.0-dev
        # explicitly, so glib-sys can't find glib-2.0.pc via pkg-config.
        # Adding both explicitly — libgtk-3-dev for safety since gtk-sys
        # is also in Tauri's transitive build chain.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libgtk-3-dev
      # protoc is required by lancedb's transitive deps (lance-encoding,
      # lance-file via prost-build) since T0.1.4. Local Windows installs
      # protoc via winget per ADR-011; CI installs it here.
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # LLVM/libclang for llama-cpp-sys-2's bindgen step (T0.2.1 spike-2,
      # 2026-05-13). Each OS uses its native package manager with robust
      # post-install path discovery per iteration 2 clarification 4 (the
      # chocolatey install path can shift across LLVM versions; the brew
      # prefix varies between Apple Silicon and Intel macOS).
      # libclang is a build-time prerequisite only — pre-built MSI / .app
      # installers ship the statically-compiled llama.cpp binary and end
      # users never need libclang on their machines.
      - if: runner.os == 'Linux'
        name: Install libclang-dev (for llama-cpp-sys-2 bindgen)
        run: sudo apt-get install -y libclang-dev
      - if: runner.os == 'Windows'
        name: Install LLVM via chocolatey
        shell: pwsh
        run: choco install llvm -y --no-progress
      - if: runner.os == 'Windows'
        name: Set LIBCLANG_PATH via discovered clang location
        shell: pwsh
        run: |
          $clangPath = (Get-Command clang.exe -ErrorAction SilentlyContinue).Source
          if (-not $clangPath) { $clangPath = "C:\Program Files\LLVM\bin\clang.exe" }
          $libclangDir = Split-Path $clangPath -Parent
          "LIBCLANG_PATH=$libclangDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - if: runner.os == 'macOS'
        name: Install LLVM via Homebrew + set LIBCLANG_PATH
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"
      # Vulkan SDK install for Windows + Linux runners. Required by
      # `llama-cpp-sys-2`'s build script when llama-cpp-2 is built with
      # `features = ["vulkan"]` — the per-target Cargo.toml in `crates/vault-llm`
      # enables this on Windows + Linux (Metal on macOS — see ADR-042 Amendment 1
      # / HANDOFF.md "V0.2 backend + tuning config locked" section). macOS skipped:
      # Metal SDK ships with Xcode and is already on the macOS runner.
      #
      # T0.2.3 close commit 7 fix-forward (2026-05-17): replaced commit 6's
      # chocolatey `vulkan-sdk` install with the direct LunarG installer pattern
      # used by llama.cpp's own release.yml CI for vulkan-x64 Windows builds.
      # Commit 6's CI run 25985499148 passed on Linux but failed on Windows
      # during llama-cpp-sys-2's nested ExternalProject_Add build of
      # `vulkan-shaders-gen`: the inner CMakeTestCCompiler probe hit
      # `error C1083: Cannot open compiler generated file: '': Invalid argument`
      # with parent `The system cannot find the batch label specified - VCEnd`.
      # Same error class as a known CMake/MSVC Debug-mode interaction (cf.
      # OpenCV forum #12262); root cause is chocolatey's wrap of the LunarG
      # installer differs subtly from running the installer directly.
      #
      # The LunarG-direct pattern below is verbatim from
      # https://github.com/ggml-org/llama.cpp/blob/master/.github/workflows/release.yml
      # which has been shipping Windows Vulkan binaries reliably. Version pinned
      # to 1.4.313.2 (matches upstream pin). Linux side unchanged (commit 6
      # confirmed green via LunarG apt repo).
      - if: runner.os == 'Windows'
        name: Install Vulkan SDK (direct LunarG installer — matches llama.cpp upstream CI)
        shell: pwsh
        env:
          VULKAN_VERSION: 1.4.313.2
        run: |
          curl.exe -o $env:RUNNER_TEMP/VulkanSDK-Installer.exe -L `
            "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/vulkansdk-windows-X64-${env:VULKAN_VERSION}.exe"
          & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\${env:VULKAN_VERSION}"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\${env:VULKAN_VERSION}\bin"
          # T0.2.3 commit 8 fix-forward (2026-05-17): force inner cmake
          # ExternalProject_Add try_compile probes to use Release config.
          # Bypasses the Debug-mode MSBuild VCEnd batch-label / error C1083
          # bug that broke `vulkan-shaders-gen` nested build on commits 6+7
          # (OpenCV forum #12262 error class). llama-cpp-sys-2's build.rs
          # passes CMAKE_* env vars through to cmake, so this reaches the
          # outer cmake; outer cmake then propagates CMAKE_TRY_COMPILE_CONFIGURATION
          # to ExternalProject_Add sub-builds. Note: commit 8 falsified this
          # hypothesis — Debug-config try_compile still ran inside the inner
          # cmake. Kept as defense-in-depth alongside the Ninja switch below.
          Add-Content $env:GITHUB_ENV "CMAKE_TRY_COMPILE_CONFIGURATION=Release"
          # T0.2.3 commit 10 fix-forward (2026-05-24): switch CMake generator
          # to Ninja for Windows. Bypasses MSBuild entirely — Ninja does not
          # have the VCEnd batch-label / error C1083 bug that blocked
          # commits 6-9 in vulkan-shaders-gen ExternalProject_Add nested
          # try_compile probes. llama-cpp-sys-2's build.rs passes CMAKE_*
          # env vars through to cmake, which propagates CMAKE_GENERATOR to
          # ExternalProject_Add sub-cmakes (unlike CMAKE_TRY_COMPILE_CONFIGURATION
          # which doesn't propagate per commit 8 falsification). Ninja is
          # preinstalled on windows-2025 runners (ships with Visual Studio
          # Build Tools); choco install line is defensive idempotency.
          choco install ninja -y --no-progress
          Add-Content $env:GITHUB_ENV "CMAKE_GENERATOR=Ninja"
          # T0.2.3 close commit 12 fix-forward (2026-05-24): shorten
          # `CARGO_TARGET_DIR` to bypass the Windows MAX_PATH=260 limit hit
          # by MSVC `cl.exe` on deeply-nested `vulkan-shaders-gen`
          # TryCompile paths. Commit 10's Ninja switch successfully
          # bypassed the MSBuild VCEnd bug (configure step started
          # executing); then `cl.exe` itself failed with `error C1083:
          # Cannot open compiler generated file: '': Invalid argument`
          # because the inner TryCompile path was ~252 chars
          # (`D:\a\Agent-Memory-Vault\Agent-Memory-Vault\target\debug
          # \build\llama-cpp-sys-2-XXX\out\build\ggml\src\ggml-vulkan
          # \vulkan-shaders-gen-prefix\src\vulkan-shaders-gen-build
          # \CMakeFiles\CMakeScratch\TryCompile-XXX\testCCompiler.c`).
          # The empty `''` filename in the C1083 error is MSVC's path-
          # overflow signature. Setting `CARGO_TARGET_DIR=D:\t` shaves
          # 42 chars off the workspace prefix (`D:\a\...target` → `D:\t`)
          # and clears the limit comfortably. `Swatinem/rust-cache@v2`
          # reads `CARGO_TARGET_DIR` automatically.
          Add-Content $env:GITHUB_ENV "CARGO_TARGET_DIR=D:\t"
          # T0.2.3 close commit 13 fix-forward (2026-05-24): reduce debug
          # info on Windows to bypass MSVC `LNK1318 LIMIT (12)` and
          # `LNK1318 FILE_SYSTEM (3)` PDB errors hit at the link stage in
          # commit 12's CI run 26367831242. With full debuginfo, the test
          # binaries (`integration_smoke`, `vault_app` lib test) link the
          # whole workspace — lance + datafusion + llama-cpp-sys + tantivy
          # — producing .pdb files that exceed MSVC's internal 2 GB cap.
          # `-C debuginfo=line-tables-only` keeps panic backtraces +
          # function names + file:line info (the only debug info CI ever
          # surfaces) while shrinking PDB ~10×. Standard upstream Rust
          # workaround (rust-lang/rust#101050, #100972). Does NOT change
          # test semantics — tests still run, fail, and report identically.
          # Local dev builds on the founder's machine are unaffected;
          # this only mutates the per-job GITHUB_ENV.
          # T0.2.3 close commit 14 fix-forward (2026-05-25): switch the
          # Windows linker from `link.exe` to `lld-link.exe`. Commit 13's
          # CI run 26369187646 confirmed `-C debuginfo=line-tables-only`
          # reduced PDB content but the MSVC link.exe PDB writer still
          # hit `LNK1318 LIMIT (12)` on `read_pipeline_scale_acceptance`
          # — the per-PDB section/type-index cap is structural to MSVC's
          # writer, not just about debuginfo volume. LLD's `lld-link.exe`
          # has a more efficient PDB writer that handles large Rust
          # workspaces (used in production by Mozilla, Tauri, Rustls).
          # lld-link.exe is bundled with the LLVM install we already do
          # via `choco install llvm` (at `C:\Program Files\LLVM\bin\
          # lld-link.exe`, added to PATH by choco); no new install step
          # needed. line-tables-only kept as belt-and-braces alongside
          # the linker switch. Rust passes the same link flags so this
          # is drop-in compatible with our existing native deps.
          Add-Content $env:GITHUB_ENV "RUSTFLAGS=-D warnings -C debuginfo=line-tables-only -C linker=lld-link"
      - if: runner.os == 'Linux'
        name: Install Vulkan SDK via LunarG apt repo
        run: |
          UBUNTU_CODENAME=$(lsb_release -sc)
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/lunarg.gpg
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan.list \
            "https://packages.lunarg.com/vulkan/lunarg-vulkan-${UBUNTU_CODENAME}.list"
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Phase 5a's tauri.conf.json bundle.resources references three files in
      # crates/vault-embedding/test-fixtures/bge-small-en-v1.5/. tauri-build's
      # build.rs validates these paths exist at compile time on every platform
      # (not just at MSI bundle time). clippy doesn't actually USE the fixtures
      # — empty `touch` placeholders satisfy the existence check. V0.2 alpha-
      # distribution will introduce per-platform bundle.windows.resources /
      # bundle.macOS.resources / bundle.linux.resources via Tauri 2's per-
      # bundler syntax, eliminating the need for these cross-platform
      # placeholder hacks. (T0.1.11 Phase 5d fix-forward, 2026-05-06.)
      - if: runner.os == 'Windows'
        name: Pin MSVC toolset to v143 (14.44) — VS2026 default breaks DuckDB fmt + llama ggml
        # GHA windows-2025 migrated to Visual Studio 2026 (MSVC 14.51) in the
        # 2026-06-08→06-15 rollout. VS2026 removed stdext::checked_array_iterator
        # (breaks DuckDB's bundled fmt under `#ifdef _SECURE_SCL` -> C2061) AND
        # broke llama.cpp's ggml (std::hardware_destructive_interference_size).
        # The image still ships the v143 (VS2022-era) MSVC 14.44 toolset "for
        # compatibility" — the exact compiler that produced the last green CI
        # (d613614, 2026-06-10). Pinning vcvars to it sets cl.exe + INCLUDE/LIB
        # for BOTH cc-rs (DuckDB) and the Ninja/CMake build (llama), fixing both
        # breaks at the root with no per-build-system shim. The superseded
        # /FI _SECURE_SCL shim (ADR-079, commit 669b8a5) only reached cc-rs and
        # leaked into ggml, so it was a dead end. Drop this pin once libduckdb-sys
        # vendors a newer fmt and llama-cpp-sys-2 supports VS2026 (tech-debt #8).
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: '14.44'
      - name: Create test-fixture placeholders for tauri-build resource validation
        shell: bash
        run: |
          mkdir -p crates/vault-embedding/test-fixtures/bge-small-en-v1.5
          touch crates/vault-embedding/test-fixtures/bge-small-en-v1.5/onnxruntime.dll
          touch crates/vault-embedding/test-fixtures/bge-small-en-v1.5/model.onnx
          touch crates/vault-embedding/test-fixtures/bge-small-en-v1.5/tokenizer.json
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build-and-test:
    name: cargo build + test
    if: github.event_name != 'schedule'
    strategy:
      # fail-fast: false — see clippy job above for rationale.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Linux-only — see clippy job above for rationale.
      # tool-cache:true added 2026-06-24 (multi-agent daemon arc): the daemon
      # added rmcp streamable-http + hyper-util deps AND two heavy new
      # integration-test binaries (streamable_http_spike,
      # concurrent_multiagent_stage_b), each linking the full vault stack.
      # Under `cargo build --all-targets` that tipped the ubuntu runner over
      # `No space left on device` (run 28095804243 — runner process killed
      # mid-build at ~13 min, System.IO.IOException, no compile error: the
      # code compiles fine, clippy-ubuntu passed). tool-cache:true frees the
      # ~8 GB /opt/hostedtoolcache we don't use (our Rust toolchain, protoc,
      # libclang are all installed fresh in later steps). Pairs with the
      # Linux debuginfo=line-tables-only shrink below.
      - if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: true
          docker-images: true
          tool-cache: true
      # Windows-only: T0.2.3 close commit 15 fix-forward (2026-05-25). The
      # windows-2025 runner hits "LLVM ERROR: IO failure on output stream:
      # no space on device" during lld-link of large workspace test binaries
      # (commit 14 CI run 26372365294). Preinstalled tooling we don't use
      # (Android SDK, .NET, Java, MongoDB, miniconda, Selenium, etc.) eats
      # ~25 GB of the 80 GB C: drive. Removing it recovers enough headroom
      # for the link stage to complete. The jlumbroso action above is apt-
      # based so doesn't apply to Windows; this is the Windows equivalent.
      #
      # NOT deleted: C:\Strawberry (Perl — required by ADR-006's vendored-
      # openssl for SQLCipher per L466 comment), C:\Program Files\LLVM
      # (we install it ourselves below), C:\VulkanSDK (we install it below),
      # C:\Users\* (Cargo cache lives here via rust-cache@v2). Surfaces
      # before/after free-space delta in CI logs for auditability.
      - if: runner.os == 'Windows'
        name: Free disk space on Windows runner
        shell: pwsh
        run: |
          $before = (Get-PSDrive C).Free / 1GB
          Write-Host "Free space before cleanup: $([math]::Round($before, 1)) GB"
          $paths = @(
            "C:\Android",
            "C:\Program Files\Android",
            "C:\Program Files (x86)\Android",
            "C:\hostedtoolcache\windows\AndroidSdk",
            "C:\Program Files\dotnet",
            "C:\Program Files\Java",
            "C:\hostedtoolcache\windows\Java_Temurin-Hotspot_jdk",
            "C:\hostedtoolcache\windows\Java_Adopt_jdk",
            "C:\hostedtoolcache\windows\Java_Zulu_jdk",
            "C:\hostedtoolcache\windows\go",
            "C:\hostedtoolcache\windows\Ruby",
            "C:\hostedtoolcache\windows\PyPy",
            "C:\miniconda",
            "C:\selenium",
            "C:\Program Files\MongoDB",
            "C:\ProgramData\chocolatey\lib\selenium-chrome-driver",
            "C:\ProgramData\chocolatey\lib\selenium-edge-driver",
            "C:\ProgramData\chocolatey\lib\selenium-firefox-driver"
          )
          foreach ($path in $paths) {
            if (Test-Path $path) {
              Remove-Item -Path $path -Recurse -Force -ErrorAction SilentlyContinue
              Write-Host "Removed: $path"
            }
          }
          $after = (Get-PSDrive C).Free / 1GB
          Write-Host "Free space after cleanup: $([math]::Round($after, 1)) GB"
          Write-Host "Freed: $([math]::Round($after - $before, 1)) GB"
      - uses: actions/checkout@v6
      # Tauri 2.x Linux native deps — same as clippy job (see comment there
      # for full rationale). MUST be in BOTH jobs because GitHub Actions
      # runners are per-job, not shared across the matrix; clippy job's
      # apt installs don't carry over to build-and-test job's runner.
      # Caught at T0.1.11 Phase 3 fix-forward 2: clippy passed Linux but
      # build-and-test failed with "Package 'glib-2.0' not found" because
      # only clippy had the install step.
      - if: runner.os == 'Linux'
        name: Install Tauri 2.x Linux native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libgtk-3-dev
      # See clippy job above — protoc needed by lancedb transitive deps.
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # See clippy job above for LLVM/libclang rationale + per-OS robust
      # path-derivation discussion. Must be in BOTH jobs because GHA matrix
      # runners don't share state across jobs (same pattern as protoc +
      # Tauri Linux deps above).
      - if: runner.os == 'Linux'
        name: Install libclang-dev (for llama-cpp-sys-2 bindgen)
        run: sudo apt-get install -y libclang-dev
      - if: runner.os == 'Windows'
        name: Install LLVM via chocolatey
        shell: pwsh
        run: choco install llvm -y --no-progress
      - if: runner.os == 'Windows'
        name: Set LIBCLANG_PATH via discovered clang location
        shell: pwsh
        run: |
          $clangPath = (Get-Command clang.exe -ErrorAction SilentlyContinue).Source
          if (-not $clangPath) { $clangPath = "C:\Program Files\LLVM\bin\clang.exe" }
          $libclangDir = Split-Path $clangPath -Parent
          "LIBCLANG_PATH=$libclangDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - if: runner.os == 'macOS'
        name: Install LLVM via Homebrew + set LIBCLANG_PATH
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"
      # Vulkan SDK install — see clippy job above for full rationale + the
      # T0.2.3 close commit 7 fix-forward audit trail. Must be in BOTH jobs
      # because GHA matrix runners don't share state across jobs (same
      # pattern as the LLVM install above).
      - if: runner.os == 'Windows'
        name: Install Vulkan SDK (direct LunarG installer — matches llama.cpp upstream CI)
        shell: pwsh
        env:
          VULKAN_VERSION: 1.4.313.2
        run: |
          curl.exe -o $env:RUNNER_TEMP/VulkanSDK-Installer.exe -L `
            "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/vulkansdk-windows-X64-${env:VULKAN_VERSION}.exe"
          & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\${env:VULKAN_VERSION}"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\${env:VULKAN_VERSION}\bin"
          # T0.2.3 commit 8 fix-forward (2026-05-17): force inner cmake
          # ExternalProject_Add try_compile probes to use Release config.
          # Bypasses the Debug-mode MSBuild VCEnd batch-label / error C1083
          # bug that broke `vulkan-shaders-gen` nested build on commits 6+7
          # (OpenCV forum #12262 error class). llama-cpp-sys-2's build.rs
          # passes CMAKE_* env vars through to cmake, so this reaches the
          # outer cmake; outer cmake then propagates CMAKE_TRY_COMPILE_CONFIGURATION
          # to ExternalProject_Add sub-builds. Note: commit 8 falsified this
          # hypothesis — Debug-config try_compile still ran inside the inner
          # cmake. Kept as defense-in-depth alongside the Ninja switch below.
          Add-Content $env:GITHUB_ENV "CMAKE_TRY_COMPILE_CONFIGURATION=Release"
          # T0.2.3 commit 10 fix-forward (2026-05-24): switch CMake generator
          # to Ninja for Windows. Bypasses MSBuild entirely — Ninja does not
          # have the VCEnd batch-label / error C1083 bug that blocked
          # commits 6-9 in vulkan-shaders-gen ExternalProject_Add nested
          # try_compile probes. llama-cpp-sys-2's build.rs passes CMAKE_*
          # env vars through to cmake, which propagates CMAKE_GENERATOR to
          # ExternalProject_Add sub-cmakes (unlike CMAKE_TRY_COMPILE_CONFIGURATION
          # which doesn't propagate per commit 8 falsification). Ninja is
          # preinstalled on windows-2025 runners (ships with Visual Studio
          # Build Tools); choco install line is defensive idempotency.
          choco install ninja -y --no-progress
          Add-Content $env:GITHUB_ENV "CMAKE_GENERATOR=Ninja"
          # T0.2.3 close commit 12 fix-forward (2026-05-24): shorten
          # `CARGO_TARGET_DIR` to bypass the Windows MAX_PATH=260 limit hit
          # by MSVC `cl.exe` on deeply-nested `vulkan-shaders-gen`
          # TryCompile paths. Commit 10's Ninja switch successfully
          # bypassed the MSBuild VCEnd bug (configure step started
          # executing); then `cl.exe` itself failed with `error C1083:
          # Cannot open compiler generated file: '': Invalid argument`
          # because the inner TryCompile path was ~252 chars
          # (`D:\a\Agent-Memory-Vault\Agent-Memory-Vault\target\debug
          # \build\llama-cpp-sys-2-XXX\out\build\ggml\src\ggml-vulkan
          # \vulkan-shaders-gen-prefix\src\vulkan-shaders-gen-build
          # \CMakeFiles\CMakeScratch\TryCompile-XXX\testCCompiler.c`).
          # The empty `''` filename in the C1083 error is MSVC's path-
          # overflow signature. Setting a short `CARGO_TARGET_DIR`
          # shaves 42 chars off the workspace prefix and clears the
          # limit comfortably. `Swatinem/rust-cache@v2` reads
          # `CARGO_TARGET_DIR` automatically.
          #
          # T0.2.3 close commit 16 fix-forward (2026-05-25): point at
          # the D: drive instead of C:. Commits 12-15 used `C:\t` (short
          # path on the C: drive). Commit 15 added a disk-cleanup step
          # that freed ~15.4 GB on C: but the link stage STILL hit
          # `LLVM ERROR: IO failure on output stream: no space on device`
          # — the workspace build needs more than 15 GB of headroom for
          # link artifacts. windows-2025 runners ship a D: drive with
          # ~150 GB free (vs C:'s ~50 GB), so moving target/ to D:
          # eliminates the disk pressure structurally rather than
          # incrementally squeezing more GB out of C:. Path length is
          # the same as `C:\t` (4 chars) so the MAX_PATH bypass from
          # commit 12 is preserved. Disk cleanup step in build-and-test
          # job is kept as defense-in-depth (no per-platform downside).
          Add-Content $env:GITHUB_ENV "CARGO_TARGET_DIR=D:\t"
          # T0.2.3 close commit 13 fix-forward (2026-05-24): reduce debug
          # info on Windows to bypass MSVC `LNK1318 LIMIT (12)` and
          # `LNK1318 FILE_SYSTEM (3)` PDB errors hit at the link stage in
          # commit 12's CI run 26367831242. With full debuginfo, the test
          # binaries (`integration_smoke`, `vault_app` lib test) link the
          # whole workspace — lance + datafusion + llama-cpp-sys + tantivy
          # — producing .pdb files that exceed MSVC's internal 2 GB cap.
          # `-C debuginfo=line-tables-only` keeps panic backtraces +
          # function names + file:line info (the only debug info CI ever
          # surfaces) while shrinking PDB ~10×. Standard upstream Rust
          # workaround (rust-lang/rust#101050, #100972). Does NOT change
          # test semantics — tests still run, fail, and report identically.
