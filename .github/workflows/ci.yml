          # hypothesis — Debug-config try_compile still ran inside the inner
          # cmake. Kept as defense-in-depth alongside the Ninja switch below.
          Add-Content $env:GITHUB_ENV "CMAKE_TRY_COMPILE_CONFIGURATION=Release"
          # T0.2.3 commit 10 fix-forward (2026-05-24): switch CMake generator
