name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # T0.2.1 ADR-044 / iteration 2 concern #1 lock: weekly cron triggers the
  # `real-model-smoke` job that runs `#[ignore]`'d real-model integration
  # tests against the actual 2.49 GB Phi-4-mini GGUF. The standard
  # fmt/clippy/build-test jobs are gated `if: github.event_name != 'schedule'`
  # to avoid burning CI on a duplicate run.
  schedule:
    - cron: '0 12 * * MON'  # Monday 12:00 UTC

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Definition of Done (BRD §0.1) requires zero warnings everywhere.
  RUSTFLAGS: "-D warnings"
  # ADR-038: bound lance/datafusion memory pool to 256 MiB so concurrent
  # merge_insert calls don't trigger 8 GB allocation aborts on the runner
  # (Phase 0a regression, 2026-05-07). Mirrors `.cargo/config.toml` `[env]`
  # but set here too because (a) ci.yml env survives even if .cargo/config
  # is ignored by future workflows that don't run via cargo, and (b) makes
  # the CI enforcement explicit at the workflow level for auditability.
  # See `crates/vault-storage/src/vector_store.rs` upsert_lock doc and
  # upstream lance-format/lance#1983 + #3601.
  LANCE_MEM_POOL_SIZE: "268435456"

jobs:
  fmt:
    name: cargo fmt
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy
    if: github.event_name != 'schedule'
    strategy:
      # fail-fast: false so a Windows-only failure (or vice versa) surfaces
      # both conclusions instead of cancelling the surviving runner. Important
      # for matrix verification — we need to see EACH OS's outcome.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Linux-only: free ~15-20GB by removing unused tooling. Windows runners
      # ship ~85 GB free, no equivalent pressure; the action itself is
      # Linux-only by design (uses apt-get / rm -rf /usr/share/dotnet etc.).
      # See HANDOFF.md "CI Discipline Recovery — 2026-05-03 finding" for the
      # 22-commit silent-failure context that landed this in Step 2a.
      - if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: true
          docker-images: true
      - uses: actions/checkout@v6
      # Tauri 2.x Linux native deps (T0.1.11 Phase 3) — required by
      # vault-tauri (and any test target that pulls vault-tauri's lib
      # transitively for the `tauri` crate's webkit2gtk / appindicator
      # FFI bindings). webkit2gtk-4.1 is the v2 line; -4.0 was v1.
      # Per Tauri 2 prerequisites: libwebkit2gtk-4.1-dev, libxdo-dev,
      # libayatana-appindicator3-dev, librsvg2-dev. libssl-dev is
      # preinstalled on ubuntu-latest. macOS + Windows ship the
      # equivalents preinstalled (Apple webkit + Microsoft WebView2).
      - if: runner.os == 'Linux'
        name: Install Tauri 2.x Linux native deps
        # libglib2.0-dev + libgtk-3-dev added defensively after T0.1.11
        # Phase 2+3 CI surfaced "Package 'glib-2.0' was not found in the
        # pkg-config search path" failure on glib-sys v0.18.1 build script.
        # Root cause: jlumbroso/free-disk-space (large-packages:true) above
        # removes packages that transitively pulled in libglib2.0-dev;
        # libwebkit2gtk-4.1-dev's apt Depends doesn't include libglib2.0-dev
        # explicitly, so glib-sys can't find glib-2.0.pc via pkg-config.
        # Adding both explicitly — libgtk-3-dev for safety since gtk-sys
        # is also in Tauri's transitive build chain.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libgtk-3-dev
      # protoc is required by lancedb's transitive deps (lance-encoding,
      # lance-file via prost-build) since T0.1.4. Local Windows installs
      # protoc via winget per ADR-011; CI installs it here.
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # LLVM/libclang for llama-cpp-sys-2's bindgen step (T0.2.1 spike-2,
      # 2026-05-13). Each OS uses its native package manager with robust
      # post-install path discovery per iteration 2 clarification 4 (the
      # chocolatey install path can shift across LLVM versions; the brew
      # prefix varies between Apple Silicon and Intel macOS).
      # libclang is a build-time prerequisite only — pre-built MSI / .app
      # installers ship the statically-compiled llama.cpp binary and end
      # users never need libclang on their machines.
      - if: runner.os == 'Linux'
        name: Install libclang-dev (for llama-cpp-sys-2 bindgen)
        run: sudo apt-get install -y libclang-dev
      - if: runner.os == 'Windows'
        name: Install LLVM via chocolatey
        shell: pwsh
        run: choco install llvm -y --no-progress
      - if: runner.os == 'Windows'
        name: Set LIBCLANG_PATH via discovered clang location
        shell: pwsh
        run: |
          $clangPath = (Get-Command clang.exe -ErrorAction SilentlyContinue).Source
          if (-not $clangPath) { $clangPath = "C:\Program Files\LLVM\bin\clang.exe" }
          $libclangDir = Split-Path $clangPath -Parent
          "LIBCLANG_PATH=$libclangDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - if: runner.os == 'macOS'
        name: Install LLVM via Homebrew + set LIBCLANG_PATH
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"
      # Vulkan SDK install for Windows + Linux runners. Required by
      # `llama-cpp-sys-2`'s build script when llama-cpp-2 is built with
      # `features = ["vulkan"]` — the per-target Cargo.toml in `crates/vault-llm`
      # enables this on Windows + Linux (Metal on macOS — see ADR-042 Amendment 1
      # / HANDOFF.md "V0.2 backend + tuning config locked" section). macOS skipped:
      # Metal SDK ships with Xcode and is already on the macOS runner.
      #
      # T0.2.3 close commit 6 fix-forward (2026-05-16): replaced commit 5's
      # `humbletim/install-vulkan-sdk@v1.2` with native installers per OS.
      # Commit 5's CI run 25933341737 failed because humbletim installs SDK
      # headers + version metadata on Linux but NOT the runtime loader
      # (libvulkan.so), and on Windows installs NEITHER headers nor loader —
      # CMake's `find_package(Vulkan)` errored "Could NOT find Vulkan (missing:
      # Vulkan_LIBRARY)" on Linux and "missing: Vulkan_LIBRARY Vulkan_INCLUDE_DIR"
      # on Windows. Native installers (chocolatey `vulkan-sdk` on Windows wrapping
      # the LunarG installer, LunarG apt repo on Linux) install the full SDK
      # (loader + headers + glslc shader compiler) in one tree where
      # `find_package(Vulkan)` is wired to look.
      - if: runner.os == 'Windows'
        name: Install Vulkan SDK via chocolatey (LunarG installer)
        shell: pwsh
        run: |
          choco install vulkan-sdk -y --no-progress
          $vulkanRoot = Get-ChildItem 'C:\VulkanSDK' -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $vulkanRoot) { throw "Vulkan SDK not found under C:\VulkanSDK after install" }
          "VULKAN_SDK=$($vulkanRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$($vulkanRoot.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
      - if: runner.os == 'Linux'
        name: Install Vulkan SDK via LunarG apt repo
        run: |
          UBUNTU_CODENAME=$(lsb_release -sc)
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/lunarg.gpg
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan.list \
            "https://packages.lunarg.com/vulkan/lunarg-vulkan-${UBUNTU_CODENAME}.list"
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Phase 5a's tauri.conf.json bundle.resources references three files in
      # crates/vault-embedding/test-fixtures/bge-small-en-v1.5/. tauri-build's
      # build.rs validates these paths exist at compile time on every platform
      # (not just at MSI bundle time). clippy doesn't actually USE the fixtures
      # — empty `touch` placeholders satisfy the existence check. V0.2 alpha-
      # distribution will introduce per-platform bundle.windows.resources /
      # bundle.macOS.resources / bundle.linux.resources via Tauri 2's per-
      # bundler syntax, eliminating the need for these cross-platform
      # placeholder hacks. (T0.1.11 Phase 5d fix-forward, 2026-05-06.)
      - name: Create test-fixture placeholders for tauri-build resource validation
        shell: bash
        run: |
          mkdir -p crates/vault-embedding/test-fixtures/bge-small-en-v1.5
          touch crates/vault-embedding/test-fixtures/bge-small-en-v1.5/onnxruntime.dll
          touch crates/vault-embedding/test-fixtures/bge-small-en-v1.5/model.onnx
          touch crates/vault-embedding/test-fixtures/bge-small-en-v1.5/tokenizer.json
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build-and-test:
    name: cargo build + test
    if: github.event_name != 'schedule'
    strategy:
      # fail-fast: false — see clippy job above for rationale.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Linux-only — see clippy job above for rationale.
      - if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: true
          docker-images: true
      - uses: actions/checkout@v6
      # Tauri 2.x Linux native deps — same as clippy job (see comment there
      # for full rationale). MUST be in BOTH jobs because GitHub Actions
      # runners are per-job, not shared across the matrix; clippy job's
      # apt installs don't carry over to build-and-test job's runner.
      # Caught at T0.1.11 Phase 3 fix-forward 2: clippy passed Linux but
      # build-and-test failed with "Package 'glib-2.0' not found" because
      # only clippy had the install step.
      - if: runner.os == 'Linux'
        name: Install Tauri 2.x Linux native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libgtk-3-dev
      # See clippy job above — protoc needed by lancedb transitive deps.
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # See clippy job above for LLVM/libclang rationale + per-OS robust
      # path-derivation discussion. Must be in BOTH jobs because GHA matrix
      # runners don't share state across jobs (same pattern as protoc +
      # Tauri Linux deps above).
      - if: runner.os == 'Linux'
        name: Install libclang-dev (for llama-cpp-sys-2 bindgen)
        run: sudo apt-get install -y libclang-dev
      - if: runner.os == 'Windows'
        name: Install LLVM via chocolatey
        shell: pwsh
        run: choco install llvm -y --no-progress
      - if: runner.os == 'Windows'
        name: Set LIBCLANG_PATH via discovered clang location
        shell: pwsh
        run: |
          $clangPath = (Get-Command clang.exe -ErrorAction SilentlyContinue).Source
          if (-not $clangPath) { $clangPath = "C:\Program Files\LLVM\bin\clang.exe" }
          $libclangDir = Split-Path $clangPath -Parent
          "LIBCLANG_PATH=$libclangDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - if: runner.os == 'macOS'
        name: Install LLVM via Homebrew + set LIBCLANG_PATH
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"
      # Vulkan SDK install — see clippy job above for full rationale + the
      # T0.2.3 close commit 6 fix-forward audit trail. Must be in BOTH jobs
      # because GHA matrix runners don't share state across jobs (same
      # pattern as the LLVM install above).
      - if: runner.os == 'Windows'
        name: Install Vulkan SDK via chocolatey (LunarG installer)
        shell: pwsh
        run: |
          choco install vulkan-sdk -y --no-progress
          $vulkanRoot = Get-ChildItem 'C:\VulkanSDK' -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $vulkanRoot) { throw "Vulkan SDK not found under C:\VulkanSDK after install" }
          "VULKAN_SDK=$($vulkanRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$($vulkanRoot.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
      - if: runner.os == 'Linux'
        name: Install Vulkan SDK via LunarG apt repo
        run: |
          UBUNTU_CODENAME=$(lsb_release -sc)
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/lunarg.gpg
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan.list \
            "https://packages.lunarg.com/vulkan/lunarg-vulkan-${UBUNTU_CODENAME}.list"
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Cache vault-embedding test fixtures (~165 MB total: model.onnx ~133 MB
      # + tokenizer.json ~711 KB + libonnxruntime.so ~30 MB). Key fingerprints
      # both the setup script (which hardcodes EXPECTED_MODEL_SHA256 +
      # ORT_VERSION + download URLs) AND integrity.rs (which holds the
      # canonical model + tokenizer SHA-256 constants per ADR-020). Either
      # changing busts the cache and forces a fresh provisioning. Per-OS
      # cache key isolates Linux vs. Windows fixtures (Step 2c).
      - name: Cache vault-embedding test fixtures
        uses: actions/cache@v4
        id: vault-embedding-fixtures
        with:
          path: crates/vault-embedding/test-fixtures
          # Cache key fingerprints BOTH setup scripts (.sh and .ps1) plus
          # integrity.rs so any change to model SHA / ORT_VERSION / download
          # URLs in either platform's setup script busts cache for both OSes.
          # Per-OS isolation preserved via runner.os in the key prefix —
          # Linux fixtures (libonnxruntime.so) and Windows fixtures
          # (onnxruntime.dll) don't collide.
          key: vault-embedding-fixtures-${{ runner.os }}-${{ hashFiles('scripts/setup-dev-env.sh', 'scripts/setup-dev-env.ps1', 'crates/vault-embedding/src/integrity.rs') }}
      - name: Provision vault-embedding test fixtures (Linux)
        if: steps.vault-embedding-fixtures.outputs.cache-hit != 'true' && runner.os == 'Linux'
        run: bash scripts/setup-dev-env.sh
      - name: Provision vault-embedding test fixtures (Windows)
        # Strawberry Perl is preinstalled on windows-latest (Windows Server
        # 2022) and required by ADR-006's bundled-sqlcipher-vendored-openssl
        # rusqlite feature for the SQLCipher build. If a future runner image
        # drops Strawberry Perl, add `shogo82148/actions-setup-perl@v1` step
        # before rust-toolchain — see HANDOFF.md tech-debt for the watchpoint.
        if: steps.vault-embedding-fixtures.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/setup-dev-env.ps1
      - name: Provision vault-embedding test fixtures (macOS)
        # macOS provisioning invokes the existing setup-dev-env.sh — the
        # Darwin branch at scripts/setup-dev-env.sh:131-135 was already
        # written at T0.1.7 (sets ORT_ASSET=onnxruntime-osx-arm64-${ORT_VERSION}.tgz,
        # ORT_LIB_NAME=libonnxruntime.dylib). No script change needed; CI
        # just invokes the same script as Linux (uname -s routes the case).
        if: steps.vault-embedding-fixtures.outputs.cache-hit != 'true' && runner.os == 'macOS'
        run: bash scripts/setup-dev-env.sh
      # Phase 5a's tauri.conf.json bundle.resources references onnxruntime.dll
      # (Windows-specific). setup-dev-env.sh's Linux + Darwin branches download
      # libonnxruntime.so / libonnxruntime.dylib respectively, NOT
      # onnxruntime.dll. tauri-build validates ALL bundle.resources paths exist
      # at compile time regardless of platform. Empty touch placeholder on
      # non-Windows satisfies the check; V0.1 only ships Windows MSI per
      # ADR-031, so non-Windows never USES the DLL. V0.2 alpha-distribution
      # will replace via per-platform bundle.windows.resources syntax.
      # (T0.1.11 Phase 5d fix-forward, 2026-05-06.)
      - name: Placeholder onnxruntime.dll on non-Windows for tauri-build cross-platform validation
        if: runner.os != 'Windows'
        shell: bash
        run: touch crates/vault-embedding/test-fixtures/bge-small-en-v1.5/onnxruntime.dll
      # Windows-only: lower cargo build parallelism to 2 to avoid peak-memory
      # OOM on the GitHub Actions windows-latest runner. T0.2.0 Phase 3
      # sub-task (f) commit `ef88361` (2026-05-12) hit two consecutive
      # Windows-only failures with different OOM stages: first run
      # `rustc-LLVM ERROR: out of memory` during vault-tauri codegen, second
      # run `LINK : fatal error LNK1102: out of memory` during integration-
      # test linking. Two distinct stages OOM-ing in a row confirmed the
      # Windows build is at the memory ceiling — not a transient flake.
      # CARGO_BUILD_JOBS=2 caps parallel codegen + linker invocations so
      # peak resident-set stays under the runner's ~16 GB ceiling. Linux +
      # macOS runners are unaffected (larger memory ceiling and lower
      # link-stage overhead per build unit). Trade-off: Windows job runs
      # ~5-10 min slower; build succeeds reliably.
      - if: runner.os == 'Windows'
        name: Lower cargo build parallelism on Windows (peak-memory ceiling fix)
        shell: bash
        run: echo "CARGO_BUILD_JOBS=2" >> "$GITHUB_ENV"
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace

  real-model-smoke:
    # T0.2.1 ADR-044 / iteration 2 §3 concern #1 lock: weekly cron OR PR-label
    # trigger only. NOT every-PR — `cargo test -p vault-llm -- --ignored`
    # downloads the 2.49 GB Phi-4-mini GGUF and runs end-to-end inference
    # (~10 min per call × 3 tests = 30+ min), which is punishing on every PR.
    # Weekly cron + on-demand label is sufficient regression coverage.
    #
    # Single-OS (windows-latest) for V0.2 per concern #6 lock — Mac Metal
    # autodetect deferred until first M1/M2 beta user joins; ubuntu-latest
    # smoke deferred until Linux beta user joins.
    name: real-model smoke (weekly cron + `run-llm-smoke` label)
    if: github.event_name == 'schedule' || contains(github.event.pull_request.labels.*.name, 'run-llm-smoke')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install LLVM via chocolatey
        shell: pwsh
        run: choco install llvm -y --no-progress
      - name: Set LIBCLANG_PATH via discovered clang location
        shell: pwsh
        run: |
          $clangPath = (Get-Command clang.exe -ErrorAction SilentlyContinue).Source
          if (-not $clangPath) { $clangPath = "C:\Program Files\LLVM\bin\clang.exe" }
          $libclangDir = Split-Path $clangPath -Parent
          "LIBCLANG_PATH=$libclangDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      # Vulkan SDK install — see clippy job above for full rationale + the
      # T0.2.3 close commit 6 fix-forward audit trail. real-model-smoke builds
      # vault-llm with `features = ["vulkan"]` (per crates/vault-llm/Cargo.toml
      # platform-conditional dep block), so the build script needs the loader +
      # headers + glslc. Windows-only by design (cron job runs only on
      # windows-latest per ADR-044 / iteration 2 §3 concern #6 lock).
      - name: Install Vulkan SDK via chocolatey (LunarG installer)
        shell: pwsh
        run: |
          choco install vulkan-sdk -y --no-progress
          $vulkanRoot = Get-ChildItem 'C:\VulkanSDK' -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $vulkanRoot) { throw "Vulkan SDK not found under C:\VulkanSDK after install" }
          "VULKAN_SDK=$($vulkanRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$($vulkanRoot.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Run `#[ignore]`'d tests in vault-llm (the real-model smoke suite).
      # `--nocapture` surfaces stdout from the spike-style stage logs so CI
      # artifacts include the SHA-256 verification + per-call latency data.
      - run: cargo test -p vault-llm -- --ignored --nocapture
