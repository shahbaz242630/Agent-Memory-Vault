          # `CARGO_TARGET_DIR` to bypass the Windows MAX_PATH=260 limit hit
          # by MSVC `cl.exe` on deeply-nested `vulkan-shaders-gen`
          # TryCompile paths. Commit 10's Ninja switch successfully
          # bypassed the MSBuild VCEnd bug (configure step started
          # executing); then `cl.exe` itself failed with `error C1083:
          # Cannot open compiler generated file: '': Invalid argument`
          # because the inner TryCompile path was ~252 chars
          # (`D:\a\Agent-Memory-Vault\Agent-Memory-Vault\target\debug
          # \build\llama-cpp-sys-2-XXX\out\build\ggml\src\ggml-vulkan
          # \vulkan-shaders-gen-prefix\src\vulkan-shaders-gen-build
          # \CMakeFiles\CMakeScratch\TryCompile-XXX\testCCompiler.c`).
