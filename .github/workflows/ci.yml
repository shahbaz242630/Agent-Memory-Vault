          # commits 6-9 in vulkan-shaders-gen ExternalProject_Add nested
          # try_compile probes. llama-cpp-sys-2's build.rs passes CMAKE_*
          # env vars through to cmake, which propagates CMAKE_GENERATOR to
          # ExternalProject_Add sub-cmakes (unlike CMAKE_TRY_COMPILE_CONFIGURATION
          # which doesn't propagate per commit 8 falsification). Ninja is
          # preinstalled on windows-2025 runners (ships with Visual Studio
          # Build Tools); choco install line is defensive idempotency.
