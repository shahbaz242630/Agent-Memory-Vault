name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Definition of Done (BRD §0.1) requires zero warnings everywhere.
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy
    strategy:
      # fail-fast: false so a Windows-only failure (or vice versa) surfaces
      # both conclusions instead of cancelling the surviving runner. Important
      # for matrix verification — we need to see EACH OS's outcome.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Linux-only: free ~15-20GB by removing unused tooling. Windows runners
      # ship ~85 GB free, no equivalent pressure; the action itself is
      # Linux-only by design (uses apt-get / rm -rf /usr/share/dotnet etc.).
      # See HANDOFF.md "CI Discipline Recovery — 2026-05-03 finding" for the
      # 22-commit silent-failure context that landed this in Step 2a.
      - if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: true
          docker-images: true
      - uses: actions/checkout@v6
      # protoc is required by lancedb's transitive deps (lance-encoding,
      # lance-file via prost-build) since T0.1.4. Local Windows installs
      # protoc via winget per ADR-011; CI installs it here.
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build-and-test:
    name: cargo build + test
    strategy:
      # fail-fast: false — see clippy job above for rationale.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Linux-only — see clippy job above for rationale.
      - if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: true
          docker-images: true
      - uses: actions/checkout@v6
      # See clippy job above — protoc needed by lancedb transitive deps.
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Cache vault-embedding test fixtures (~165 MB total: model.onnx ~133 MB
      # + tokenizer.json ~711 KB + libonnxruntime.so ~30 MB). Key fingerprints
      # both the setup script (which hardcodes EXPECTED_MODEL_SHA256 +
      # ORT_VERSION + download URLs) AND integrity.rs (which holds the
      # canonical model + tokenizer SHA-256 constants per ADR-020). Either
      # changing busts the cache and forces a fresh provisioning. Per-OS
      # cache key isolates Linux vs. Windows fixtures (Step 2c).
      - name: Cache vault-embedding test fixtures
        uses: actions/cache@v4
        id: vault-embedding-fixtures
        with:
          path: crates/vault-embedding/test-fixtures
          # Cache key fingerprints BOTH setup scripts (.sh and .ps1) plus
          # integrity.rs so any change to model SHA / ORT_VERSION / download
          # URLs in either platform's setup script busts cache for both OSes.
          # Per-OS isolation preserved via runner.os in the key prefix —
          # Linux fixtures (libonnxruntime.so) and Windows fixtures
          # (onnxruntime.dll) don't collide.
          key: vault-embedding-fixtures-${{ runner.os }}-${{ hashFiles('scripts/setup-dev-env.sh', 'scripts/setup-dev-env.ps1', 'crates/vault-embedding/src/integrity.rs') }}
      - name: Provision vault-embedding test fixtures (Linux)
        if: steps.vault-embedding-fixtures.outputs.cache-hit != 'true' && runner.os == 'Linux'
        run: bash scripts/setup-dev-env.sh
      - name: Provision vault-embedding test fixtures (Windows)
        # Strawberry Perl is preinstalled on windows-latest (Windows Server
        # 2022) and required by ADR-006's bundled-sqlcipher-vendored-openssl
        # rusqlite feature for the SQLCipher build. If a future runner image
        # drops Strawberry Perl, add `shogo82148/actions-setup-perl@v1` step
        # before rust-toolchain — see HANDOFF.md tech-debt for the watchpoint.
        if: steps.vault-embedding-fixtures.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/setup-dev-env.ps1
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace
