name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Definition of Done (BRD §0.1) requires zero warnings everywhere.
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      # Free ~15-20GB by removing unused tooling on the GitHub-hosted runner
      # (dotnet, ghc, android, docker images). Required since T0.1.6 C1a:
      # libduckdb-sys archive step (libduckdb.a) exhausts disk on the default
      # ~14GB free margin. Pre-checkout so cleanup runs on a fresh runner.
      # @main is a deliberate floating-tag exception for CI-only infra
      # (security-patches-auto-apply); does NOT shift the @vN pinning
      # precedent for first-party action references. See HANDOFF.md
      # "CI Discipline Recovery — 2026-05-03 finding".
      - uses: jlumbroso/free-disk-space@main
        with:
          large-packages: true
          docker-images: true
      - uses: actions/checkout@v6
      # protoc is required by lancedb's transitive deps (lance-encoding,
      # lance-file via prost-build) since T0.1.4. Local Windows installs
      # protoc via winget per ADR-011; CI installs it here.
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build-and-test:
    name: cargo build + test
    runs-on: ubuntu-latest
    steps:
      # Mirror of clippy job — see comment block there for full context.
      - uses: jlumbroso/free-disk-space@main
        with:
          large-packages: true
          docker-images: true
      - uses: actions/checkout@v6
      # See clippy job above — protoc needed by lancedb transitive deps.
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Cache vault-embedding test fixtures (~165 MB total: model.onnx ~133 MB
      # + tokenizer.json ~711 KB + libonnxruntime.so ~30 MB). Key fingerprints
      # both the setup script (which hardcodes EXPECTED_MODEL_SHA256 +
      # ORT_VERSION + download URLs) AND integrity.rs (which holds the
      # canonical model + tokenizer SHA-256 constants per ADR-020). Either
      # changing busts the cache and forces a fresh provisioning. Per-OS
      # cache key isolates Linux vs. Windows fixtures (Step 2c).
      - name: Cache vault-embedding test fixtures
        uses: actions/cache@v4
        id: vault-embedding-fixtures
        with:
          path: crates/vault-embedding/test-fixtures
          key: vault-embedding-fixtures-${{ runner.os }}-${{ hashFiles('scripts/setup-dev-env.sh', 'crates/vault-embedding/src/integrity.rs') }}
      - name: Provision vault-embedding test fixtures
        if: steps.vault-embedding-fixtures.outputs.cache-hit != 'true'
        run: bash scripts/setup-dev-env.sh
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace
