        # path, which VS2026 broke (std::hardware_destructive_interference_size).
        # It never carried the DuckDB /FI shim (vault-llm doesn't link DuckDB),
        # so VS2026 would break this job's ggml compile outright. Pin to the
        # v143 (14.44) compatibility toolset — same fix as the clippy/build jobs.
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: '14.44'
      # Run `#[ignore]`'d tests in vault-llm (the real-model smoke suite).
      # `--nocapture` surfaces stdout from the spike-style stage logs so CI
      # artifacts include the SHA-256 verification + per-call latency data.
      # `--test-threads=1` serialises the smoke tests (tech-debt #6): they
      # share a single `.partial` download path (`model_loader.rs`), so a
      # concurrent run lets the winner's rename vanish the losers' `.partial`
